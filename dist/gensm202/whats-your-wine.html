<style>
  :root {
    --accent: #7b2d43;
    --bg: #f7ead9;
    --radius: 22px;
    --ink: #2c1820;
    --ink-soft: #6f5158;
    --card: #fffaf4;
    --line: #ecd9c8;
    --head: "Fredoka", system-ui, sans-serif;
    --body: "Nunito", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--body);
    color: var(--ink);
    background: #2a1118;
    background-image: radial-gradient(120% 80% at 50% -10%, #4a1f2b 0%, #2a1118 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; display: flex; justify-content: center; }

  .phone {
    position: relative;
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  @media (min-width: 500px) {
    .phone {
      min-height: 0;
      height: 92vh;
      max-height: 880px;
      border-radius: 38px;
      box-shadow: 0 40px 90px -30px rgba(0,0,0,.6), 0 0 0 10px rgba(255,255,255,.04);
    }
  }
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: clamp(22px, 6vw, 30px);
    animation: screenIn .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .screen { animation: none; }
  }

  /* ---- intro ---- */
  .intro-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .aim-logo { height: 46px; width: auto; display: block; }
  .aim-word {
    font-family: var(--head); font-weight: 700; font-size: 30px;
    letter-spacing: .04em; color: var(--accent);
  }
  .lt5 { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; }
  .lt5-by { font-size: 11px; color: var(--ink-soft); }
  .lt5-name { font-family: var(--head); font-weight: 700; font-size: 16px; color: var(--ink); letter-spacing: .02em; }

  .intro-hero {
    position: relative;
    margin-top: 22px;
    aspect-ratio: 5 / 4;
    border-radius: 26px;
    overflow: hidden;
  }
  .hero-tag {
    position: absolute; top: 14px; left: 14px; z-index: 2;
    background: var(--accent); color: #fff;
    font-family: var(--head); font-weight: 600; font-size: 13px;
    padding: 6px 13px; border-radius: 999px; white-space: nowrap;
    box-shadow: 0 6px 16px -6px rgba(0,0,0,.4);
  }
  .intro-copy { margin-top: auto; padding-top: 26px; }
  .title {
    font-family: var(--head); font-weight: 700;
    font-size: clamp(46px, 15vw, 62px);
    line-height: .92; letter-spacing: -.01em; color: var(--ink);
  }
  .title em { font-style: normal; color: var(--accent); }
  .sub {
    margin-top: 16px; font-size: 16px; line-height: 1.5;
    color: var(--ink-soft); text-wrap: pretty; max-width: 34ch;
  }
  .sub strong { color: var(--accent); font-weight: 700; }

  /* ---- buttons ---- */
  .btn {
    font-family: var(--head); font-weight: 600; cursor: pointer;
    border: none; border-radius: 999px; white-space: nowrap; transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  }
  .btn:active { transform: translateY(2px) scale(.99); }
  .btn.big { font-size: 19px; padding: 17px 26px; width: 100%; }
  .btn.primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 14px 26px -12px color-mix(in srgb, var(--accent) 80%, black);
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn.primary:hover { box-shadow: 0 18px 32px -12px color-mix(in srgb, var(--accent) 80%, black); }
  .btn-arrow { transition: transform .2s ease; }
  .btn.primary:hover .btn-arrow { transform: translateX(4px); }
  .btn.ghost {
    background: transparent; color: var(--ink-soft); font-size: 15px;
    padding: 12px; width: 100%; font-family: var(--body); font-weight: 700;
  }
  .btn.ghost:hover { color: var(--accent); }
  .intro .btn.primary { margin-top: 22px; }

  /* ---- question ---- */
  .q-head { display: flex; align-items: center; gap: 14px; }
  .iconbtn {
    flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%;
    border: none; background: var(--card); color: var(--ink);
    font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px -4px rgba(0,0,0,.25);
    transition: transform .12s ease;
  }
  .iconbtn:active { transform: scale(.92); }
  .q-count { flex: 0 0 auto; font-family: var(--head); font-weight: 600; font-size: 14px; color: var(--ink-soft); }
  .progress { flex: 1; display: flex; gap: 6px; }
  .pdot { flex: 1; height: 7px; border-radius: 999px; background: var(--line); transition: background .35s ease; }
  .pdot.on { background: var(--accent); }
  .pdot.now { background: color-mix(in srgb, var(--accent) 55%, var(--bg)); }

  .q-body { margin-top: 30px; }
  .q-kind {
    display: inline-block; font-family: var(--head); font-weight: 600;
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--bg));
    padding: 5px 12px; border-radius: 999px;
  }
  .q-text {
    margin-top: 16px; font-family: var(--head); font-weight: 600;
    font-size: clamp(28px, 8.5vw, 36px); line-height: 1.08; color: var(--ink);
    letter-spacing: -.01em; text-wrap: balance;
  }

  .options { margin-top: auto; padding-top: 26px; display: flex; flex-direction: column; gap: 12px; }
  .option {
    display: flex; align-items: center; gap: 15px; text-align: left;
    background: var(--card); border: 2px solid transparent;
    border-radius: var(--radius); padding: 15px 17px; cursor: pointer;
    box-shadow: 0 3px 12px -8px rgba(60,20,30,.4);
    transition: transform .15s cubic-bezier(.2,.8,.2,1), border-color .15s ease, background .15s ease, opacity .25s ease;
    animation: optIn .45s cubic-bezier(.2,.8,.2,1) both;
  }
  .option:nth-child(1){animation-delay:.04s} .option:nth-child(2){animation-delay:.10s}
  .option:nth-child(3){animation-delay:.16s} .option:nth-child(4){animation-delay:.22s}
  @keyframes optIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .option:hover { transform: translateX(3px); border-color: color-mix(in srgb, var(--accent) 35%, var(--bg)); }
  .option.picked { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 9%, var(--card)); transform: scale(1.015); }
  .option.dim { opacity: .42; }
  .opt-dot {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid color-mix(in srgb, var(--accent) 45%, var(--bg));
    display: grid; place-items: center; transition: border-color .2s ease;
  }
  .option.picked .opt-dot { border-color: var(--accent); }
  .opt-dot-in {
    width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
    transform: scale(0); transition: transform .25s cubic-bezier(.2,1.5,.4,1);
  }
  .option.picked .opt-dot-in { transform: scale(1); }
  .opt-txt { display: flex; flex-direction: column; gap: 2px; }
  .opt-label { font-family: var(--head); font-weight: 600; font-size: 17px; color: var(--ink); line-height: 1.1; }
  .opt-sub { font-size: 13px; color: var(--ink-soft); }

  /* ---- result ---- */
  .result { text-align: center; align-items: center; }
  .r-eyebrow { font-family: var(--head); font-weight: 600; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-soft); }
  .r-world {
    margin-top: 12px; font-family: var(--head); font-weight: 600; font-size: 12px;
    letter-spacing: .1em; text-transform: uppercase; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, var(--bg)); padding: 6px 14px; border-radius: 999px;
  }
  .r-name { font-family: var(--head); font-weight: 700; font-size: clamp(40px, 12vw, 52px); line-height: .96; margin-top: 14px; color: var(--ink); letter-spacing: -.01em; }
  .r-tagline { font-family: var(--head); font-weight: 500; font-size: 18px; color: var(--accent); margin-top: 8px; }

  .r-card {
    display: flex; align-items: center; gap: 16px; text-align: left;
    background: var(--card); border-radius: var(--radius); padding: 16px;
    margin-top: 24px; width: 100%; box-shadow: 0 10px 28px -16px rgba(60,20,30,.5);
  }
  .r-card-txt { display: flex; flex-direction: column; gap: 3px; }
  .r-card-lbl { font-size: 12px; color: var(--ink-soft); letter-spacing: .04em; text-transform: uppercase; font-weight: 700; }
  .r-wine { font-family: var(--head); font-weight: 700; font-size: 23px; line-height: 1.05; color: var(--ink); }
  .r-region { font-size: 14px; color: var(--ink-soft); }

  .r-body { margin-top: 20px; font-size: 16px; line-height: 1.55; color: var(--ink-soft); text-wrap: pretty; }
  .notes { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; }
  .chip {
    font-family: var(--head); font-weight: 600; font-size: 13px; color: var(--accent);
    border: 1.5px solid color-mix(in srgb, var(--accent) 30%, var(--bg));
    padding: 6px 14px; border-radius: 999px;
  }

  .meter { width: 100%; margin-top: 26px; }
  .meter-labels { display: flex; justify-content: space-between; font-family: var(--head); font-weight: 600; font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; white-space: nowrap; }
  .meter-track { position: relative; height: 10px; border-radius: 999px; background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 18%, var(--bg)), color-mix(in srgb, var(--accent) 70%, var(--bg))); }
  .meter-fill { position: absolute; inset: 0 auto 0 0; border-radius: 999px; background: var(--accent); transition: width .8s cubic-bezier(.2,.8,.2,1); }
  .meter-knob {
    position: absolute; top: 50%; width: 22px; height: 22px; border-radius: 50%;
    background: #fff; border: 4px solid var(--accent); transform: translate(-50%, -50%);
    box-shadow: 0 4px 10px -3px rgba(0,0,0,.35); transition: left .8s cubic-bezier(.2,.8,.2,1);
  }
  .r-actions { margin-top: 28px; width: 100%; padding-bottom: 6px; }

  /* ---- image slots (illustrated placeholders; swap in real photos any time) ---- */
  .img-slot { display: block; width: 100%; height: 100%; overflow: hidden; background: var(--line); background-size: cover; background-position: center; }
  .img-slot svg, .img-slot img { display: block; width: 100%; height: 100%; }
  .img-slot img { object-fit: cover; }
  .img-slot--circle {
    width: 118px; height: 118px; flex: 0 0 auto; border-radius: 50%;
    background: radial-gradient(circle at 50% 36%, color-mix(in srgb, var(--accent) 16%, #fff), color-mix(in srgb, var(--accent) 6%, var(--card)));
  }
</style>
</head>

<script>
(function () {
  "use strict";

  var AIM_LOGO = "https://aim.edu/wp-content/uploads/2025/08/AIM-LOGO-New-min.png";
  var ACCENT = "#7b2d43";
  var CONFETTI = [ACCENT, "#e8a0b0", "#f3e9c6", "#c46a82"];

  /* ---------- quiz data ----------
     Scoring axis: negative = Old World (tradition, terroir, restraint),
     positive = New World (ripe, bold, modern). Sum of 5 answers => result. */
  var QUESTIONS = [
    {
      kind: "Taste",
      q: "First sip — what makes you go “mmm”?",
      options: [
        { label: "Earthy & savory", sub: "like a forest after rain", score: -2 },
        { label: "Bright & tart", sub: "mouth-watering acidity", score: -1 },
        { label: "Juicy & ripe", sub: "sun-warmed berries", score: 1 },
        { label: "Big & jammy", sub: "bold and warming", score: 2 },
      ],
    },
    {
      kind: "Mood",
      q: "Your ideal Friday night is…",
      options: [
        { label: "Candlelit dinner for two", sub: "slow and intimate", score: -2 },
        { label: "A book and a record", sub: "cozy and quiet", score: -1 },
        { label: "A dinner party you host", sub: "lively, full table", score: 1 },
        { label: "Out dancing till late", sub: "lights, music, energy", score: 2 },
      ],
    },
    {
      kind: "Lifestyle",
      q: "Pick a dream getaway.",
      options: [
        { label: "Vigan's old stone streets", sub: "cobblestones & calesa rides", score: -2 },
        { label: "Batanes hills & chapels", sub: "timeless, wind-swept, quiet", score: -1 },
        { label: "A Tagaytay ridge cafe", sub: "cool breeze, easy views", score: 1 },
        { label: "Boracay after dark", sub: "white sand, all night", score: 2 },
      ],
    },
    {
      kind: "Taste",
      q: "How do you take your coffee?",
      options: [
        { label: "Straight espresso", sub: "no notes, no fuss", score: -2 },
        { label: "Pour-over", sub: "I taste the origin", score: -1 },
        { label: "Oat latte", sub: "smooth and easy", score: 1 },
        { label: "Iced caramel everything", sub: "the sweeter the better", score: 2 },
      ],
    },
    {
      kind: "Personality",
      q: "Which sounds most like you?",
      options: [
        { label: "Tradition is comfort", sub: "the classics never miss", score: -2 },
        { label: "Quietly curious", sub: "I notice the details", score: -1 },
        { label: "Always up for new", sub: "surprise me", score: 1 },
        { label: "Go big or go home", sub: "more is more", score: 2 },
      ],
    },
  ];

  // Results, from Old World to New World. min/max are inclusive score bounds.
  var RESULTS = [
    {
      id: "purist", min: -10, max: -7,
      world: "Old World",
      name: "The Purist",
      tagline: "Old World, no compromises.",
      body: "You don’t chase trends — you trust the classics that earned their place. Structured, serious and built to age, your palate rewards patience and accepts nothing less than the real thing.",
      wine: "Barolo",
      region: "Piedmont, Italy",
      notes: ["Structured", "Earthy", "Age-worthy"],
      wineColor: "#8f3540",
      img: "barolo.jpg",
    },
    {
      id: "old-soul", min: -6, max: -3,
      world: "Old World",
      name: "The Old Soul",
      tagline: "Old World, through and through.",
      body: "You’re drawn to wine with history, restraint and a deep sense of place. Earthy, elegant and built to be lingered over — nothing rushed, nothing loud.",
      wine: "Burgundian Pinot Noir",
      region: "Burgundy, France",
      notes: ["Earthy", "Elegant", "Terroir-driven"],
      wineColor: "#9b3149",
      img: "old-soul.jpg",
    },
    {
      id: "romantic", min: -2, max: 0,
      world: "Leans Old World",
      name: "The Romantic",
      tagline: "An Old World heart.",
      body: "You love subtlety and a little story in the glass — wines with charm, freshness and just enough mystery to keep you coming back.",
      wine: "Chianti Classico",
      region: "Tuscany, Italy",
      notes: ["Bright", "Savory", "Food-loving"],
      wineColor: "#b23a4e",
      img: "chianti-classico.jpg",
    },
    {
      id: "free-spirit", min: 1, max: 3,
      world: "Leans New World",
      name: "The Free Spirit",
      tagline: "A New World wanderer.",
      body: "You like wine that’s generous, sunny and easy to fall for — ripe fruit, open arms and a glass that always says yes.",
      wine: "Sauvignon Blanc",
      region: "Marlborough, New Zealand",
      notes: ["Fruity", "Vibrant", "Crowd-pleasing"],
      wineColor: "#e6c75a",
      img: "sauvignon-blanc.jpg",
    },
    {
      id: "adventurer", min: 4, max: 6,
      world: "New World",
      name: "The Adventurer",
      tagline: "New World, full throttle.",
      body: "You want it bold, ripe and unapologetic — big fruit, big body, big personality. Why whisper when the wine can roar?",
      wine: "Cabernet Sauvignon",
      region: "Napa Valley, USA",
      notes: ["Bold", "Ripe", "Full-bodied"],
      wineColor: "#5e1f33",
      img: "cabernet-sauvignon.jpg",
    },
    {
      id: "showstopper", min: 7, max: 10,
      world: "New World",
      name: "The Showstopper",
      tagline: "New World, turned all the way up.",
      body: "Subtle was never the goal. You want wine that walks in and owns the room — opulent, jammy and impossible to ignore. If it doesn’t make a statement, why pour it?",
      wine: "Barossa Shiraz",
      region: "Barossa Valley, Australia",
      notes: ["Jammy", "Peppery", "Powerful"],
      wineColor: "#481a30",
      img: "barossa-shiraz.jpg",
    },
  ];

  function resultForScore(sum) {
    for (var i = 0; i < RESULTS.length; i++) {
      if (sum >= RESULTS[i].min && sum <= RESULTS[i].max) return RESULTS[i];
    }
    return RESULTS[0];
  }
  // position on the Old <-> New meter, 0..100
  function worldPosition(sum) {
    return Math.round(((sum + 10) / 20) * 100);
  }

  /* ---------- result fallback art (used only if a photo is missing) ---------- */
  function glassSVG(wine) {
    return '<svg viewBox="0 0 120 120" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">' +
      '<defs><clipPath id="bowlClip"><path d="M37 27 C37 53 46 65 60 65 C74 65 83 53 83 27 Z"/></clipPath></defs>' +
      '<rect x="35" y="44" width="50" height="26" fill="' + wine + '" clip-path="url(#bowlClip)"/>' +
      '<path d="M37 27 H83" stroke="#6f5158" stroke-width="3.2" stroke-linecap="round"/>' +
      '<path d="M37 27 C37 53 46 65 60 65 C74 65 83 53 83 27" stroke="#6f5158" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<path d="M60 65 V92" stroke="#6f5158" stroke-width="3.2" stroke-linecap="round"/>' +
      '<ellipse cx="60" cy="94" rx="15" ry="3.4" stroke="#6f5158" stroke-width="3.2"/>' +
      '<path d="M45 31 C45 45 48 53 53 57" stroke="rgba(255,255,255,.55)" stroke-width="2.4" stroke-linecap="round"/>' +
    '</svg>';
  }

  /* ---------- canvas confetti burst ---------- */
  function fireConfetti(colors) {
    colors = colors || CONFETTI;
    var canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999";
    document.body.appendChild(canvas);
    var ctx = canvas.getContext("2d");
    var dpr = window.devicePixelRatio || 1;
    function size() {
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    size();
    var N = 140, cx = innerWidth / 2, parts = [];
    for (var i = 0; i < N; i++) {
      var a = Math.random() * Math.PI - Math.PI / 2; // upward-ish
      var speed = 6 + Math.random() * 9;
      parts.push({
        x: cx + (Math.random() - 0.5) * 80,
        y: innerHeight * 0.32,
        vx: Math.cos(a) * speed * (Math.random() > 0.5 ? 1 : -1) * 0.6,
        vy: -Math.abs(Math.sin(a)) * speed - 4,
        g: 0.22 + Math.random() * 0.12,
        w: 6 + Math.random() * 7,
        h: 9 + Math.random() * 9,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.3,
        color: colors[(Math.random() * colors.length) | 0],
        life: 0,
        ttl: 120 + Math.random() * 50,
      });
    }
    var raf;
    function frame() {
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      var alive = false;
      for (var k = 0; k < parts.length; k++) {
        var p = parts[k];
        p.life++;
        if (p.life > p.ttl) continue;
        alive = true;
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(0, 1 - p.life / p.ttl);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (alive) raf = requestAnimationFrame(frame);
      else canvas.remove();
    }
    addEventListener("resize", size);
    raf = requestAnimationFrame(frame);
    setTimeout(function () { cancelAnimationFrame(raf); canvas.remove(); }, 4000);
  }

  /* ---------- helpers ---------- */
  function el(html) {
    var t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }
  function reduceMotion() {
    return window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  }

  /* ---------- state ---------- */
  var app = document.getElementById("app");
  var screen = "intro"; // intro | quiz | result
  var qi = 0;
  var scores = [];

  function start() { scores = []; qi = 0; screen = "quiz"; render(); }
  function pick(score) {
    scores[qi] = score;
    if (qi + 1 < QUESTIONS.length) { qi += 1; render(); }
    else { screen = "result"; render(); }
  }
  function back() {
    if (qi === 0) { screen = "intro"; render(); }
    else { scores.pop(); qi -= 1; render(); }
  }

  /* ---------- screens ---------- */
  function renderIntro() {
    var s = el(
      '<div class="screen intro">' +
        '<div class="intro-top">' +
          '<img class="aim-logo" src="' + AIM_LOGO + '" alt="AIM" />' +
          '<div class="lt5">' +
            '<span class="lt5-by">A wine experience by</span>' +
            '<span class="lt5-name">Group LT5</span>' +
          '</div>' +
        '</div>' +
        '<div class="intro-hero">' +
          '<div class="img-slot"><img src="hero.jpg" alt="A vineyard at golden hour" /></div>' +
          '<span class="hero-tag">5 questions</span>' +
        '</div>' +
        '<div class="intro-copy">' +
          '<h1 class="title">What’s<br/>Your <em>Wine?</em></h1>' +
          '<p class="sub">Five quick taps and we’ll tell you where your palate truly belongs — ' +
            'the timeless <strong>Old World</strong> or the bold <strong>New World</strong>.</p>' +
        '</div>' +
        '<button class="btn primary big" id="start-btn">Pour me in <span class="btn-arrow">→</span></button>' +
      '</div>'
    );
    var logo = s.querySelector(".aim-logo");
    logo.addEventListener("error", function () {
      var w = document.createElement("div");
      w.className = "aim-word";
      w.textContent = "AIM";
      logo.replaceWith(w);
    });
    s.querySelector("#start-btn").addEventListener("click", start);
    return s;
  }

  function renderQuestion() {
    var data = QUESTIONS[qi];
    var total = QUESTIONS.length;
    var dots = "";
    for (var i = 0; i < total; i++) {
      dots += '<span class="pdot' + (i <= qi ? " on" : "") + (i === qi ? " now" : "") + '"></span>';
    }
    var opts = "";
    for (var j = 0; j < data.options.length; j++) {
      var o = data.options[j];
      opts +=
        '<button class="option" type="button">' +
          '<span class="opt-dot"><span class="opt-dot-in"></span></span>' +
          '<span class="opt-txt">' +
            '<span class="opt-label">' + o.label + '</span>' +
            '<span class="opt-sub">' + o.sub + '</span>' +
          '</span>' +
        '</button>';
    }
    var s = el(
      '<div class="screen question">' +
        '<div class="q-head">' +
          '<button class="iconbtn" id="back-btn" type="button" aria-label="Back">←</button>' +
          '<div class="progress" role="progressbar" aria-valuenow="' + (qi + 1) + '" aria-valuemax="' + total + '">' + dots + '</div>' +
          '<span class="q-count">' + (qi + 1) + '/' + total + '</span>' +
        '</div>' +
        '<div class="q-body">' +
          '<span class="q-kind">' + data.kind + '</span>' +
          '<h2 class="q-text">' + data.q + '</h2>' +
        '</div>' +
        '<div class="options"></div>' +
      '</div>'
    );
    s.querySelector(".options").innerHTML = opts;
    s.querySelector("#back-btn").addEventListener("click", back);

    var picked = false;
    var buttons = s.querySelectorAll(".option");
    buttons.forEach(function (btn, idx) {
      btn.addEventListener("click", function () {
        if (picked) return;
        picked = true;
        btn.classList.add("picked");
        buttons.forEach(function (b, k) { if (k !== idx) b.classList.add("dim"); });
        setTimeout(function () { pick(data.options[idx].score); }, 300);
      });
    });
    return s;
  }

  function renderResult() {
    var sum = scores.reduce(function (a, b) { return a + b; }, 0);
    var r = resultForScore(sum);
    var pos = worldPosition(sum);
    var art = r.img ? '<img src="' + r.img + '" alt="' + r.wine + '" />' : glassSVG(r.wineColor);
    var slotAttrs = r.img ? '' : ' role="img" aria-label="' + r.wine + '"';

    var s = el(
      '<div class="screen result">' +
        '<span class="r-eyebrow">Your result</span>' +
        '<span class="r-world">' + r.world + '</span>' +
        '<h1 class="r-name">' + r.name + '</h1>' +
        '<p class="r-tagline">' + r.tagline + '</p>' +
        '<div class="r-card">' +
          '<div class="img-slot img-slot--circle"' + slotAttrs + '>' + art + '</div>' +
          '<div class="r-card-txt">' +
            '<span class="r-card-lbl">Pour yourself a</span>' +
            '<span class="r-wine">' + r.wine + '</span>' +
            '<span class="r-region">' + r.region + '</span>' +
          '</div>' +
        '</div>' +
        '<p class="r-body">' + r.body + '</p>' +
        '<div class="notes"></div>' +
        '<div class="meter">' +
          '<div class="meter-labels"><span>Old World</span><span>New World</span></div>' +
          '<div class="meter-track">' +
            '<div class="meter-fill"></div>' +
            '<div class="meter-knob"></div>' +
          '</div>' +
        '</div>' +
        '<div class="r-actions">' +
          '<button class="btn primary big" id="share-btn" type="button">Share my wine</button>' +
          '<button class="btn ghost" id="restart-btn" type="button">Start over</button>' +
        '</div>' +
      '</div>'
    );

    var notes = s.querySelector(".notes");
    r.notes.forEach(function (n) {
      var chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = n;
      notes.appendChild(chip);
    });

    var fill = s.querySelector(".meter-fill");
    var knob = s.querySelector(".meter-knob");
    if (reduceMotion()) {
      fill.style.width = pos + "%";
      knob.style.left = pos + "%";
    } else {
      fill.style.width = "0%";
      knob.style.left = "0%";
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          fill.style.width = pos + "%";
          knob.style.left = pos + "%";
        });
      });
    }

    s.querySelector("#restart-btn").addEventListener("click", start);
    var shareBtn = s.querySelector("#share-btn");
    shareBtn.addEventListener("click", function () { share(shareBtn, r); });

    if (!reduceMotion()) {
      setTimeout(function () { fireConfetti(CONFETTI); }, 260);
    }
    return s;
  }

  function share(btn, r) {
    var text = "I'm " + r.name + " — my wine is " + r.wine + ". What's yours? (LT5 Wine Quiz)";
    if (navigator.share) {
      navigator.share({ title: "What's Your Wine?", text: text }).catch(function () {});
    } else {
      if (navigator.clipboard) navigator.clipboard.writeText(text);
      btn.textContent = "Copied!";
      setTimeout(function () { btn.textContent = "Share my wine"; }, 1800);
    }
  }

  function render() {
    var node = screen === "intro" ? renderIntro() : screen === "quiz" ? renderQuestion() : renderResult();
    app.replaceChildren(node);
  }

  render();
})();
</script>
</body>
</html>
