<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=630">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;0,700;1,400&family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  font-family: 'Source Serif 4', Georgia, serif;
  background: #faf8f4;
  color: #1a1714;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 48px;
  border-bottom: 3px solid #1a1714;
  background: #ffffff;
}
.top-bar h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.top-bar h1 span { color: #b44a2d; }
.top-bar .case-ref { font-family: 'DM Mono', monospace; font-size: 13px; color: #8c857a; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 48px;
}
.label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #b44a2d;
  margin-bottom: 16px;
}
h2 {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 24px;
}
.equation {
  font-family: 'STIX Two Text', 'Cambria Math', Georgia, serif;
  font-size: 28px;
  background: #f2efe9;
  border: 1px solid #ddd8cf;
  border-radius: 6px;
  padding: 18px 32px;
  display: inline-block;
  letter-spacing: 0.3px;
  color: #5c564c;
  margin-bottom: 28px;
}
.equation em { font-style: italic; }
.subtitle {
  font-size: 18px;
  color: #5c564c;
  line-height: 1.5;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  border-top: 1px solid #ddd8cf;
  background: #ffffff;
}
.authors {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: #8c857a;
}
.course {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: #8c857a;
}

.accent-bar {
  height: 4px;
  background: linear-gradient(90deg, #b44a2d 0%, #c4930a 33%, #2d8a4e 66%, #2d5fb4 100%);
}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="top-bar">
  <h1>LT<span>5</span></h1>
  <div class="case-ref">GECON 210 — Interactive Case Study</div>
</div>
<div class="main">
  <div class="label">Long-Run Growth Theory</div>
  <h2>The Solow Model<br>Unleashed</h2>
  <div class="equation">
    <em>Y</em> = <em>A</em> · <em>K</em><sup>α</sup> · <em>L</em><sup>1−α</sup>
  </div>
  <div class="subtitle">Interactive simulations of capital accumulation, steady-state dynamics, and convergence across economies.</div>
</div>
<div class="footer">
  <div class="authors">Brizuela · Magbitang · Pascua · Valencia</div>
  <div class="course">EMBA 2027A</div>
</div>
</body>
</html>
